name: Deploy LAMP via Ansible

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  ansible-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Клонируем репозиторий
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Устанавливаем SSH ключ из секрета
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      # 3. Добавляем known_hosts для NAT и LAMP
      - name: Add known_hosts entries
        run: |
          mkdir -p ~/.ssh
          # NAT сервер
          echo "89.169.3.160 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIGYe6DXP419gy6FWBBCIDpNUpxYluWsJmisuXl3bGnr1" >> ~/.ssh/known_hosts
          echo "89.169.3.160 ssh-rsa " >> ~/.ssh/known_hosts
          echo "89.169.3.160 ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBJPHi9N3w+d4GFHnLqQtujaYTIdudrb/yzIBWUaerywkBbWv/6hNkOKcBL8RISC2iFJ357AB8cEe+58ojpxSpic=" >> ~/.ssh/known_hosts
          # LAMP сервер
          echo "192.168.0.10 ssh-rsa " >> ~/.ssh/known_hosts
          echo "192.168.0.10 ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBC1FYXLda6tn6QmTlTpg5/nPqevUAm7RFAr96AjUP9Tnk5kjnuRi05SUgvs+/uQPiA5Jg+esnGM1XAgXmfcDEro=" >> ~/.ssh/known_hosts
          echo "192.168.0.10 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIOCRX0AMIgIkZf95doLEnZJ8ffoQG/JGLJ2DWcecuecb" >> ~/.ssh/known_hosts

      # 4. Устанавливаем Ansible
      - name: Install Ansible
        run: |
          sudo apt update
          sudo apt install -y ansible sshpass

      # 5. Создаём inventory на лету
      - name: Generate inventory file
        run: |
          echo "[lamp_servers]" > inventory.ini
          echo "lamp-server-1 ansible_host=192.168.0.10 ansible_user=root ansible_ssh_private_key_file=~/.ssh/id_rsa ansible_ssh_common_args='-o StrictHostKeyChecking=no -o ProxyCommand=\"ssh -i ~/.ssh/id_rsa -W %h:%p root@${{ secrets.NAT_IP }}\"'" >> inventory.ini
          echo "lamp-server-2 ansible_host=192.168.0.11 ansible_user=root ansible_ssh_private_key_file=~/.ssh/id_rsa ansible_ssh_common_args='-o StrictHostKeyChecking=no -o ProxyCommand=\"ssh -i ~/.ssh/id_rsa -W %h:%p root@${{ secrets.NAT_IP }}\"'" >> inventory.ini
          echo "" >> inventory.ini
          echo "[lamp_servers:vars]" >> inventory.ini
          echo "nat_ip=${{ secrets.NAT_IP }}" >> inventory.ini

      # 6. Запускаем Ansible playbook
      - name: Run Ansible Playbook
        run: |
          ansible-playbook -i inventory.ini playbook/site.yml
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
