name: Test SSH via NAT with Ansible

on:
  push:
    branches:
      - main

jobs:
  ssh_test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Test SSH connection via NAT
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa \
            -o ProxyJump="${{ secrets.ANSIBLE_USERNAME }}@${{ secrets.NAT_IP }}" \
            ${{ secrets.ANSIBLE_USERNAME }}@${{ secrets.LAMP_IP }} \
            "echo 'CONNECTED from GitHub Actions!' && uname -a && curl -sS http://localhost:80 || echo 'curl_failed'"

      - name: Run Ansible Playbook
        run: |
          ansible-playbook -i inventory.ini playbook/site.yml \
            --user ${{ secrets.ANSIBLE_USERNAME }} \
            --private-key ~/.ssh/id_rsa
