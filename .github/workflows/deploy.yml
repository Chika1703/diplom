name: Test SSH via NAT

on:
  workflow_dispatch:  # позволяет запускать вручную

jobs:
  ssh-test:
    runs-on: ubuntu-latest

    env:
      LAMP_IP: ${{ secrets.LAMP_IP }}
      NAT_IP: ${{ secrets.NAT_IP }}
      ANSIBLE_USERNAME: ${{ secrets.ANSIBLE_USERNAME }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # Загружаем приватный ключ из секрета
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # Добавляем ключи NAT в known_hosts
          cat <<'EOF' >> ~/.ssh/known_hosts
          |1|tVue8CQ7E++bv31vjH/f5ltIGMQ=|O963SDI9AQOniuREuAJhi19kX+E= ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBJPHi9N3w+d4GFHnLqQtujaYTIdudrb/yzIBWUaerywkBbWv/6hNkOKcBL8RISC2iFJ357AB8cEe+58ojpxSpic=
          |1|WpDXG/SnzDWGaIXzUh32qgQyyLE=|BkcHlm6XhjmFtXmGLX0GnW9N/v0= ssh-rsa 
          |1|hBBbuns6r0zvdWQGdhXLjmjYO1Y=|TnWFJFRJiE4a2siavmvb81aA0vk= ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIGYe6DXP419gy6FWBBCIDpNUpxYluWsJmisuXl3bGnr1
          EOF

          chmod 600 ~/.ssh/known_hosts

      - name: Test SSH connection
        run: |
          ssh -o StrictHostKeyChecking=yes \
              -o ProxyJump="${ANSIBLE_USERNAME}@${NAT_IP}" \
              "${ANSIBLE_USERNAME}@${LAMP_IP}" \
              "echo 'CONNECTED from GitHub Actions!' && uname -a && curl -sS http://localhost:80 || echo 'curl_failed'"
