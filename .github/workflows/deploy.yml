name: Deploy infrastructure via Terraform & Ansible

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # Установка SSH ключа
      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      # Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: ./terraform
        run: terraform apply -auto-approve

      # Получаем NAT IP из Terraform
      - name: Get NAT IP
        id: nat
        working-directory: ./terraform
        run: |
          echo "nat_ip=$(terraform output -raw nat_public_ip)" >> $GITHUB_ENV

      # Установка Ansible
      - name: Install Ansible
        run: |
          sudo apt update
          sudo apt install -y ansible sshpass

      # Запуск Ansible Playbook
      - name: Run Ansible
        working-directory: ./playbook
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          ansible-playbook \
            -i ../terraform/inventory.ini \
            site.yml \
            --user=${{ secrets.ANSIBLE_USERNAME }} \
            --private-key ~/.ssh/id_rsa

      - name: Final output
        run: echo "Deployment complete. NAT IP = ${{ env.nat_ip }}"
