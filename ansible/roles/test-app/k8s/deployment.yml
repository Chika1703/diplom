apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-nginx-app
  namespace: test-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: test-nginx-app
  template:
    metadata:
      labels:
        app: test-nginx-app
    spec:
      nodeSelector:
        node-role.kubernetes.io/worker: "true"
      containers:
        - name: test-nginx-app
          image: chika1703/test-nginx-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
