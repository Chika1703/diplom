image:
  name: hashicorp/terraform:1.6
  entrypoint: ["/bin/sh", "-lc"]

stages:
  - validate
  - plan
  - apply

variables:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"

before_script:
  - cd terraform
  # Создаём файл с приватным ключом из CI/CD переменной
  - echo "$TF_VAR_private_key_content" > private_key.pem
  - chmod 600 private_key.pem
  - terraform --version

validate:
  stage: validate
  script:
    - terraform init -backend=false
    - terraform validate

plan:
  stage: plan
  script:
    - rm -rf .terraform
    - terraform init
    # Передаём путь к приватному ключу через -var
    - terraform plan -var="private_key_path=private_key.pem" -out=tfplan
  only:
    - main

apply:
  stage: apply
  script:
    # Передаём путь к приватному ключу также при apply
    - terraform apply -var="private_key_path=private_key.pem" -auto-approve tfplan
  only:
    - main
