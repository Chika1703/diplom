image:
  name: hashicorp/terraform:1.6
  entrypoint: ["/bin/sh", "-lc"]

stages:
  - validate
  - plan
  - apply

variables:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"

before_script:
  - cd terraform
  - echo "$TF_VAR_private_key_content" > private_key.pem
  - chmod 600 private_key.pem
  - terraform --version

validate:
  stage: validate
  script:
    - terraform init -backend=false
    - terraform validate

plan:
  stage: plan
  script:
    - cd terraform
    - echo "$TF_VAR_private_key_content" > private_key.pem
    - chmod 600 private_key.pem
    - terraform init
    - terraform plan -var="private_key_path=private_key.pem" -out=tfplan
  artifacts:
    paths:
      - terraform/tfplan
    expire_in: 1 hour
  only:
    - main

apply:
  stage: apply
  dependencies:
    - plan
  script:
    - cd terraform
    - echo "$TF_VAR_private_key_content" > private_key.pem
    - chmod 600 private_key.pem
    - terraform apply -var="private_key_path=private_key.pem" -auto-approve tfplan
  only:
    - main
