- name: Настроить DNS
  lineinfile:
    path: /etc/systemd/resolved.conf
    regexp: '^#DNS='
    line: 'DNS=8.8.8.8 1.1.1.1'
    state: present
  become: yes

- name: Добавить default route через NAT
  command: ip route add default via 192.168.0.220
  become: yes
  ignore_errors: yes

- name: Перезапустить systemd-resolved
  systemd:
    name: systemd-resolved
    state: restarted
  become: yes


- name: Обновить apt cache
  apt:
    update_cache: yes

- name: Install Apache
  apt:
    name: apache2
    state: present
    update_cache: yes

- name: Add PHP repository
  apt_repository:
    repo: ppa:ondrej/php
    state: present

- name: Update apt cache after adding PPA
  apt:
    update_cache: yes

- name: Install PHP 8.2 and modules
  apt:
    name:
      - php8.2
      - libapache2-mod-php8.2
      - php8.2-mysql
    state: present
    update_cache: yes

- name: Ensure Apache is running
  service:
    name: apache2
    state: started
    enabled: yes

- name: Deploy dynamic test page
  copy:
    content: |
      <html>
      <head><title>Server Info</title></head>
      <body>
        <h1>Hello from {{ inventory_hostname }}</h1>
        <p>Current datetime: {{ ansible_date_time.iso8601 }}</p>
        <p>Deployed via CI/CD: Yes ✅</p>
      </body>
      </html>
    dest: /var/www/html/index.html
    owner: www-data
    group: www-data
    mode: '0644'

- name: Deploy PHP test page
  copy:
    content: "<?php phpinfo(); ?>"
    dest: /var/www/html/index.php
    owner: www-data
    group: www-data
    mode: '0644'