- name: Настроить DNS
  ansible.builtin.lineinfile:
    path: /etc/systemd/resolved.conf
    regexp: '^#DNS='
    line: 'DNS=8.8.8.8 1.1.1.1'
    state: present
  become: yes

- name: Добавить default route через NAT, если отсутствует
  ansible.builtin.command:
    cmd: ip route add default via 192.168.0.220
  become: yes
  args:
    warn: false
  register: add_route
  failed_when: add_route.rc not in [0, 2]

- name: Перезапустить systemd-resolved
  ansible.builtin.systemd:
    name: systemd-resolved
    state: restarted
  become: yes

- name: Обновить apt cache
  ansible.builtin.apt:
    update_cache: yes
  become: yes

- name: Install Apache
  ansible.builtin.apt:
    name: apache2
    state: present
  become: yes

- name: Add PHP repository
  ansible.builtin.apt_repository:
    repo: ppa:ondrej/php
    state: present
  become: yes

- name: Update apt cache after adding PPA
  ansible.builtin.apt:
    update_cache: yes
  become: yes

- name: Install PHP 8.2 and modules
  ansible.builtin.apt:
    name:
      - php8.2
      - libapache2-mod-php8.2
      - php8.2-mysql
    state: present
  become: yes

- name: Ensure Apache is running
  ansible.builtin.service:
    name: apache2
    state: started
    enabled: yes
  become: yes

- name: Deploy dynamic test page
  ansible.builtin.copy:
    content: |
      <html>
      <head><meta charset="UTF-8"><title>Server Info</title></head>
      <body>
        <h1>Hello from {{ inventory_hostname }}</h1>
        <p>Current datetime: {{ ansible_date_time.iso8601 }}</p>
        <p>Deployed via CI/CD: Yes Дима Колб</p>
      </body>
      </html>
    dest: /var/www/html/index.html
    owner: www-data
    group: www-data
    mode: '0644'
  become: yes

- name: Deploy PHP test page
  ansible.builtin.copy:
    content: "<?php phpinfo(); ?>"
    dest: /var/www/html/index.php
    owner: www-data
    group: www-data
    mode: '0644'
  become: yes
