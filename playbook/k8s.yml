---
- name: Подготовка всех серверов под Kubernetes
  hosts: all
  become: yes
  vars:
    pod_network_cidr: "10.244.0.0/16"
  tasks:
    - name: Обновляем систему
      apt:
        update_cache: yes
        upgrade: dist

    - name: Устанавливаем базовые пакеты
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - apt-transport-https
        state: present

    - name: Отключаем swap
      command: swapoff -a

    - name: Закомментировать swap в fstab
      replace:
        path: /etc/fstab
        regexp: '^([^#].*swap.*)$'
        replace: '#\1'

    - name: Включаем br_netfilter для Flannel на всех нодах
      modprobe:
        name: br_netfilter
        state: present

    - name: Настраиваем sysctl для k8s
      copy:
        dest: /etc/sysctl.d/k8s.conf
        content: |
          net.bridge.bridge-nf-call-iptables  = 1
          net.ipv4.ip_forward                 = 1
          net.bridge.bridge-nf-call-ip6tables = 1
      notify:
        - reload sysctl

    - name: Установить containerd
      apt:
        name: containerd
        state: present

    - name: Создать директорию для containerd
      file:
        path: /etc/containerd
        state: directory
        mode: '0755'

    - name: Получить default config containerd
      command: containerd config default
      register: containerd_conf
      changed_when: false

    - name: Сохранить конфиг containerd
      copy:
        dest: /etc/containerd/config.toml
        content: "{{ containerd_conf.stdout }}"

    - name: Включаем SystemdCgroup для containerd
      lineinfile:
        path: /etc/containerd/config.toml
        regexp: 'SystemdCgroup = false'
        line: 'SystemdCgroup = true'

    - name: Перезапустить containerd
      systemd:
        name: containerd
        state: restarted
        enabled: yes

    - name: Добавляем GPG и репозиторий Kubernetes
      block:
        - name: Добавляем ключ
          get_url:
            url: https://pkgs.k8s.io/core:/stable:/v1.30/deb/Release.key
            dest: /usr/share/keyrings/kubernetes-archive-keyring.asc

        - name: Добавляем репозиторий
          copy:
            dest: /etc/apt/sources.list.d/kubernetes.list
            content: |
              deb [signed-by=/usr/share/keyrings/kubernetes-archive-keyring.asc] https://pkgs.k8s.io/core:/stable:/v1.30/deb/ /

    - name: 
      apt:
        update_cache: yes

    - name: Устанавливаем kubeadm, kubelet, kubectl
      apt:
        name:
          - kubelet
          - kubeadm
          - kubectl
        state: present


    - name: Заблокировать версии kubeadm, kubelet, kubectl
      command: apt-mark hold kubelet kubeadm kubectl
  
  handlers:
    - name: reload sysctl
      become: yes
      command: sysctl --system
      
- name: Настройка NAT сервера (Master)
  hosts: k8s-master
  become: yes
  tasks:
    - name: Включить UFW и открыть порты
      block:
        - apt:
            name: ufw
            state: present
        - ufw:
            rule: allow
            port: 22 
        - ufw:
            rule: allow
            port: 6443
        - ufw:
            rule: allow
            port: 2379:2380
            proto: tcp
        - ufw:
            rule: allow
            port: 10250
        - ufw:
            rule: allow
            port: 10251
        - ufw:
            rule: allow
            port: 10252
        - ufw:
            state: enabled

    - name: Инициализация Kubernetes master
      command: >
        kubeadm init
        --apiserver-advertise-address={{ ansible_host }}
        --pod-network-cidr={{ pod_network_cidr }}
      register: kubeadm_init
      args:
        creates: /etc/kubernetes/admin.conf

    - name: Создать каталог .kube
      file:
        path: /root/.kube
        state: directory
        mode: 0700

    - name: Копируем admin.conf
      copy:
        src: /etc/kubernetes/admin.conf
        dest: /root/.kube/config
        remote_src: yes
        owner: root
        group: root
        mode: 0600
        
    - name: Получаем join-команду на мастере
      command: kubeadm token create --print-join-command
      register: kubeadm_join_command
      changed_when: false
      run_once: true

    - name: Сохраняем join-команду как факт для всех хостов
      set_fact:
        kubeadm_join_command_all: "{{ kubeadm_join_command.stdout }}"
      run_once: true
    
    - name: Установить Helm на master
      block:
        - name: Скачать последнюю версию Helm
          get_url:
            url: https://get.helm.sh/helm-v3.12.3-linux-amd64.tar.gz
            dest: /tmp/helm.tar.gz

        - name: Распаковать Helm
          unarchive:
            src: /tmp/helm.tar.gz
            dest: /tmp
            remote_src: yes

        - name: Переместить бинарник helm в /usr/local/bin
          command: mv /tmp/linux-amd64/helm /usr/local/bin/helm
          args:
            creates: /usr/local/bin/helm

        - name: Проверка версии Helm
          command: helm version
          register: helm_version
          changed_when: false

        - debug:
            var: helm_version.stdout

    - name: Применяем Flannel
      command: kubectl apply -f https://raw.githubusercontent.com/flannel-io/flannel/master/Documentation/kube-flannel.yml
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf

  handlers:
    - name: reload sysctl
      become: yes
      command: sysctl --system

- name: Настройка worker нод
  hosts: k8s-workers
  become: yes
  tasks:
    - name: Включить UFW и открыть порты
      block:
        - apt:
            name: ufw
            state: present
        - ufw:
            rule: allow
            port: 22 
        - ufw:
            rule: allow
            port: 10250
        - ufw:
            state: enabled

    - name: Включаем ip_forward на воркерах
      sysctl:
        name: net.ipv4.ip_forward
        value: '1'
        state: present
        reload: yes

    - name: Выполнить kubeadm join
      command: "{{ hostvars['nat'].kubeadm_join_command_all }}"
      args:
        creates: /etc/kubernetes/kubelet.conf

